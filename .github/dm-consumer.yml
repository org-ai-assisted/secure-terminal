## Per-repo parameter overrides. Read at workflow runtime by the reusable
## workflows in developer-meta-files. Top-level keys mirror the consumer-template
## basename without the 'consumer-' prefix.
##
## Spec:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/agents/github-actions-consumer-templates.md

coverity:
  ## scan.coverity.com project name -- the slash-free name the project is
  ## actually registered under (org-ai-assisted-secure-terminal); the token in
  ## COVERITY_SCAN_TOKEN is scoped to it. An earlier "secure-terminal/secure-terminal"
  ## did not match the registration and 401'd on the build-tool download.
  project-name:    "org-ai-assisted-secure-terminal"
  canonical-repos: "secure-terminal/secure-terminal,org-ai-assisted/secure-terminal"

## The widget suite runs secure-terminal offscreen (PyQt6 + pyte), the fuzz suite
## uses hypothesis, and the coverage gate uses coverage.py; ncurses-bin provides
## `tic`, which the opt-in restricted-terminfo tests compile the shipped entry
## with (the base image ships only libncursesw6, not the tic binary). All on top
## of python3.
dist-ai-tests:
  apt-packages: "python3 python3-pyqt6 python3-pyte python3-hypothesis python3-coverage ncurses-bin"
