## ai-judge-hook: commands allowed WITHOUT calling the AI (fast, free, obviously
## safe). One command name, or a "git status"-style prefix, per line. Editing
## this is documentation of what the AI judge is NEVER consulted about, so keep
## it to genuinely harmless, read-only commands. Override by placing your own
## ai-judge-allow.conf in a higher tier (/etc, /usr/local/etc, or -- if
## hook_config_allow_user=true -- ~/.config/secure-terminal.d).
ls
pwd
cd
clear
echo
cat
whoami
id
date
history
type
which
man
git status
git log
git diff
git branch
git show
q
exit
true
false
