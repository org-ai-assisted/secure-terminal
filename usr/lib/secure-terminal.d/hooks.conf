## Hook configuration gate.
##
## hook_config_allow_user -- may the user's ~/.config/secure-terminal.d override
## the hook prompt / allowlist / rules (ai-judge-prompt.txt, ai-judge-allow.conf,
## example-hook-rules.conf)? These are security-relevant (a weakened prompt or a
## broadened allowlist could let a dangerous command through), so the default is
## NO: only the privileged tiers (/usr/lib, /etc, /usr/local/etc) configure them.
## An administrator sets this to true to let users customise their own hooks.
hook_config_allow_user=false
